<!DOCTYPE html>
<html lang="ar" dir="rtl" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - نظام ERP</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    fontFamily: {
                        "display": ["Manrope", "system-ui", "sans-serif"]
                    },
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Manrope', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    </style>
</head>
<body class="bg-slate-900 min-h-screen flex flex-col transition-colors">
    {% include '_navbar.html' %}
    <main class="flex-1 flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <!-- Logo & Title -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-2xl mb-4 shadow-lg">
                <span class="material-symbols-outlined text-white text-3xl">enterprise</span>
            </div>
            <h1 class="text-3xl font-bold text-slate-100 mb-2">نظام إدارة الأعمال</h1>
            <p class="text-slate-400">تسجيل الدخول إلى حسابك</p>
        </div>

        <!-- Login Form -->
        <div class="bg-slate-800 rounded-xl shadow-lg p-8 border border-slate-700">
            <form method="POST" class="space-y-6">
                {% csrf_token %}
                
                <!-- Username -->
                <div>
                    <label class="block text-sm font-semibold text-slate-100 mb-2">اسم المستخدم أو البريد الإلكتروني</label>
                    <input type="text" name="username" required class="w-full px-4 py-2 rounded-lg border border-slate-600 bg-slate-700 text-slate-100 placeholder-slate-400 focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-colors" placeholder="ادخل اسم المستخدم">
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-sm font-semibold text-slate-100 mb-2">كلمة المرور</label>
                    <input type="password" name="password" required class="w-full px-4 py-2 rounded-lg border border-slate-600 bg-slate-700 text-slate-100 placeholder-slate-400 focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-colors" placeholder="ادخل كلمة المرور">
                </div>

                <!-- Remember Me -->
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" name="remember" class="w-4 h-4 text-blue-600 rounded border-slate-600 bg-slate-700 focus:ring-blue-600">
                    <span class="text-sm text-slate-400">تذكرني في المرة القادمة</span>
                </label>

                <!-- Submit Button -->
                <button type="submit" class="w-full py-3 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700 transition-colors shadow-md">
                    دخول
                </button>
            </form>

            <!-- Footer -->
            <div class="mt-6 pt-6 border-t border-slate-700 text-center">
                <p class="text-sm text-slate-400">
                    ليس لديك حساب؟ <a href="/register/" class="text-blue-400 hover:text-blue-300 hover:underline font-semibold">إنشاء حساب جديد</a>
                </p>
            </div>
        </div>
    </div>
    </main>
</body>
</html>
