<!DOCTYPE html>
<html lang="ar" class="dark" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأكيد حذف الضريبة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {}
            }
        }
    </script>
</head>
<body class="bg-slate-900 text-slate-100 font-arabic">
    <div class="min-h-screen flex items-center justify-center px-4 py-12">
        <div class="w-full max-w-md">
            <!-- Card Container -->
            <div class="bg-slate-800 rounded-lg shadow-lg p-8 border border-slate-700">
                <!-- Warning Icon -->
                <div class="flex justify-center mb-6">
                    <div class="bg-red-900/20 rounded-full p-4">
                        <span class="material-symbols-outlined text-red-400 text-5xl">warning</span>
                    </div>
                </div>

                <!-- Title -->
                <h1 class="text-2xl font-bold text-center mb-2 text-slate-100">
                    تأكيد الحذف
                </h1>

                <!-- Subtitle -->
                <p class="text-center text-slate-400 mb-6">
                    هل أنت متأكد من حذف فئة الضريبة التالية؟
                </p>

                <!-- Tax Information -->
                <div class="bg-slate-700/50 rounded-lg p-4 mb-8 border border-slate-600">
                    <div class="flex items-center gap-3 mb-3">
                        <span class="material-symbols-outlined text-amber-400">percent</span>
                        <span class="text-slate-200 font-semibold">{{ tax.name }}</span>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="material-symbols-outlined text-blue-400">calculate</span>
                        <span class="text-slate-300">معدل الضريبة: <span class="font-bold text-slate-100">{{ tax.rate }}%</span></span>
                    </div>
                </div>

                <!-- Warning Message -->
                <div class="bg-red-900/20 border border-red-800 rounded-lg p-4 mb-8">
                    <div class="flex gap-3">
                        <span class="material-symbols-outlined text-red-400 flex-shrink-0">error</span>
                        <p class="text-sm text-red-200">
                            لا يمكن التراجع عن هذا الإجراء. سيتم حذف هذه الفئة بشكل نهائي من النظام.
                        </p>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="flex gap-3">
                    <!-- Cancel Button -->
                    <a href="{% url 'taxes' %}" class="flex-1">
                        <button class="w-full bg-slate-700 hover:bg-slate-600 text-slate-100 font-semibold py-2 px-4 rounded-lg transition-colors duration-200 flex items-center justify-center gap-2">
                            <span class="material-symbols-outlined">close</span>
                            الإلغاء
                        </button>
                    </a>

                    <!-- Delete Button -->
                    <form method="POST" class="flex-1">
                        {% csrf_token %}
                        <button type="submit" class="w-full bg-red-600 hover:bg-red-700 text-white font-semibold py-2 px-4 rounded-lg transition-colors duration-200 flex items-center justify-center gap-2">
                            <span class="material-symbols-outlined">delete</span>
                            حذف نهائياً
                        </button>
                    </form>
                </div>

                <!-- Information Message -->
                <p class="text-center text-xs text-slate-500 mt-6">
                    سيتم إعادة توجيهك إلى قائمة الضرائب بعد الحذف
                </p>
            </div>
        </div>
    </div>

    <style>
        .font-arabic {
            font-family: 'Segoe UI', 'Arial', 'Helvetica', sans-serif;
        }
    </style>
</body>
</html>
