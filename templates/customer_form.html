<!DOCTYPE html>
<html class="dark" lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ action }} عميل - نظام ERP</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    fontFamily: {
                        "display": ["Manrope", "system-ui", "sans-serif"]
                    },
                },
            },
        }
    </script>
    <style>
        body { 
            font-family: 'Manrope', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: rgb(15 23 42);
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 transition-colors">
    <div class="max-w-2xl mx-auto p-8">
        <!-- Card -->
        <div class="bg-slate-800 rounded-xl shadow-2xl p-8 border border-slate-700">
            <h1 class="text-3xl font-bold mb-6 text-white">{{ action }} عميل</h1>
            
            {% if messages %}
                {% for message in messages %}
                <div class="bg-green-900/30 border border-green-600 text-green-300 px-4 py-3 rounded-lg mb-4">
                    {{ message }}
                </div>
                {% endfor %}
            {% endif %}
            
            <form method="post" class="space-y-6">
                {% csrf_token %}
                
                <div>
                    <label class="block text-sm font-semibold text-slate-200 mb-2">اسم العميل <span class="text-red-400">*</span></label>
                    <input type="text" name="name" required class="w-full px-4 py-2 rounded-lg border border-slate-600 bg-slate-900 text-slate-100 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors placeholder-slate-500" placeholder="ادخل اسم العميل">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-slate-200 mb-2">البريد الإلكتروني</label>
                        <input type="email" name="email" class="w-full px-4 py-2 rounded-lg border border-slate-600 bg-slate-900 text-slate-100 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors placeholder-slate-500" placeholder="example@email.com">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-200 mb-2">رقم الهاتف</label>
                        <input type="tel" name="phone" class="w-full px-4 py-2 rounded-lg border border-slate-600 bg-slate-900 text-slate-100 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors placeholder-slate-500" placeholder="+966 5XXXXXXXX">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-200 mb-2">العنوان</label>
                    <textarea name="address" rows="3" class="w-full px-4 py-2 rounded-lg border border-slate-600 bg-slate-900 text-slate-100 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors placeholder-slate-500" placeholder="ادخل عنوان العميل"></textarea>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-200 mb-2">نوع العميل</label>
                    <select name="customer_type" class="w-full px-4 py-2 rounded-lg border border-slate-600 bg-slate-900 text-slate-100 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors">
                        <option value="individual">فرد</option>
                        <option value="company">شركة</option>
                    </select>
                </div>

                <div class="flex items-center gap-2">
                    <input type="checkbox" name="is_active" checked class="w-4 h-4 rounded border-slate-600 bg-slate-900 text-blue-500 focus:ring-2 focus:ring-blue-500">
                    <label class="text-sm font-medium text-slate-200">العميل نشط</label>
                </div>

                <div class="flex gap-3 pt-4">
                    <button type="submit" class="flex-1 py-3 bg-emerald-500 text-white font-semibold rounded-lg hover:bg-emerald-600 transition-colors flex items-center justify-center gap-2">
                        <span class="material-symbols-outlined">save</span>
                        حفظ
                    </button>
                    <a href="{% url 'customers' %}" class="flex-1 py-3 bg-slate-700 text-slate-100 font-semibold rounded-lg hover:bg-slate-600 transition-colors text-center flex items-center justify-center gap-2">
                        <span class="material-symbols-outlined">cancel</span>
                        إلغاء
                    </a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
